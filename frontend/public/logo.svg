<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#000"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#B8F02C" stroke-width="2"/>

  <!-- Spider web (top right) -->
  <g stroke="#B8F02C" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M 180 20 L 145 55"/>
    <path d="M 180 20 L 155 22"/>
    <path d="M 180 20 L 178 48"/>
    <path d="M 178 48 L 145 55 L 155 22"/>
    <path d="M 173 30 L 162 32 L 165 42 L 175 40 L 173 30"/>
  </g>

  <!-- Pixelated padlock (left side), shackle + body -->
  <g fill="#B8F02C">
    <!-- Shackle -->
    <rect x="40" y="50" width="10" height="10"/>
    <rect x="50" y="40" width="10" height="10"/>
    <rect x="60" y="36" width="10" height="10"/>
    <rect x="70" y="36" width="10" height="10"/>
    <rect x="80" y="40" width="10" height="10"/>
    <rect x="90" y="50" width="10" height="10"/>
    <rect x="40" y="60" width="10" height="10"/>
    <rect x="90" y="60" width="10" height="10"/>
    <rect x="40" y="70" width="10" height="10"/>
    <rect x="90" y="70" width="10" height="10"/>
    <!-- Body -->
    <rect x="20" y="80" width="100" height="10"/>
    <rect x="20" y="90" width="100" height="10"/>
    <rect x="20" y="100" width="100" height="10"/>
    <rect x="20" y="110" width="100" height="10"/>
    <rect x="20" y="120" width="100" height="10"/>
    <rect x="20" y="130" width="100" height="10"/>
    <rect x="20" y="140" width="100" height="10"/>
    <rect x="20" y="150" width="100" height="10"/>
    <!-- Drop pointer -->
    <rect x="60" y="160" width="10" height="10"/>
    <rect x="70" y="160" width="10" height="10"/>
    <rect x="65" y="170" width="10" height="10"/>
  </g>

  <!-- Keyhole (cutout) -->
  <g fill="#000">
    <circle cx="70" cy="105" r="8"/>
    <rect x="65" y="105" width="10" height="20"/>
  </g>

  <!-- WS letters (right side) -->
  <g fill="#B8F02C" font-family="'Arial Black', sans-serif" font-weight="900">
    <text x="115" y="120" font-size="60" letter-spacing="-2">WS</text>
  </g>
</svg>
